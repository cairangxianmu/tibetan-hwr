<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>藏文手写识别</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <!-- ===== Header ===== -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-tibetan">ཀ</span>
        <div>
          <h1>藏文手写识别</h1>
          <p>Tibetan Handwriting Recognition</p>
        </div>
      </div>
      <nav class="mode-tabs" role="tablist" aria-label="识别模式">
        <button class="tab active" data-mode="digit" role="tab" aria-selected="true">
          <span class="tab-icon">༠–༩</span>
          <span>数字识别</span>
        </button>
        <button class="tab" data-mode="letter" role="tab" aria-selected="false">
          <span class="tab-icon">ཀ–ཨ</span>
          <span>字母识别</span>
        </button>
      </nav>
    </div>
  </header>

  <!-- ===== Main ===== -->
  <main class="main">
    <div class="card-grid">

      <!-- ── Left: 手写画板 ── -->
      <section class="card input-card">
        <h2 class="card-title">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          手写输入
        </h2>

        <div class="canvas-wrap">
          <canvas id="canvas" width="400" height="400" aria-label="手写画板"></canvas>
          <div class="canvas-hint" id="canvasHint">在此书写</div>
        </div>

        <div class="canvas-controls">
          <div class="pen-group">
            <label for="penSize">粗细</label>
            <input type="range" id="penSize" min="4" max="32" value="14" />
            <span id="penSizeVal">14</span>
          </div>
          <div class="btn-group">
            <button class="btn btn-ghost" id="undoBtn" title="撤销 (Ctrl+Z)">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
              撤销
            </button>
            <button class="btn btn-ghost" id="clearBtn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
              清除
            </button>
          </div>
        </div>
      </section>

      <!-- ── Right column ── -->
      <div class="right-col">

        <!-- 操作区 -->
        <section class="card action-card">
          <h2 class="card-title">
            <svg width="15" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            操作
          </h2>
          <div class="action-btns">
            <button class="btn btn-primary btn-action" id="recognizeBtn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              识别
            </button>
            <label class="btn btn-ghost btn-action" id="uploadArea" title="支持 PNG / JPG / BMP，可拖拽">
              <input type="file" id="fileInput" accept="image/*" hidden />
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              上传图片
            </label>
          </div>
          <p class="action-hint">Enter 识别 · Ctrl+Z 撤销</p>
        </section>

        <!-- 结果区 -->
        <section class="card result-card">
          <h2 class="card-title">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            识别结果
          </h2>

          <!-- idle -->
          <div class="result-idle" id="stateIdle">
            <div class="idle-char">ཀ</div>
            <p>书写或上传图片后点击「识别」</p>
          </div>

          <!-- loading -->
          <div class="result-loading hidden" id="stateLoading">
            <div class="spinner"></div>
            <p>识别中…</p>
          </div>

          <!-- error -->
          <div class="result-error hidden" id="stateError">
            <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            <p id="errorMsg">识别失败，请重试</p>
          </div>

          <!-- result -->
          <div class="result-content hidden" id="stateResult">
            <div class="result-hero">
              <div class="result-char" id="resultChar">ཀ</div>
              <div class="result-meta">
                <span class="result-label" id="resultLabel"></span>
                <span class="result-mode"  id="resultMode"></span>
              </div>
            </div>

            <div class="confidence-bar-wrap">
              <div class="confidence-label">
                <span>置信度</span>
                <span id="confidencePct">—</span>
              </div>
              <div class="confidence-track">
                <div class="confidence-fill" id="confidenceFill"></div>
              </div>
            </div>

            <div class="top5-section">
              <h3 class="top5-title">候选结果 Top 5</h3>
              <ol class="top5-list" id="top5List"></ol>
            </div>
          </div>
        </section>

      </div><!-- /right-col -->
    </div>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
